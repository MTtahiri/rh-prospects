<script>
  // Scroll reveal
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Radio buttons
  const optC = document.getElementById('opt-candidat');
  const optR = document.getElementById('opt-recruteur');
  [optC, optR].forEach(opt => opt.addEventListener('click', () => {
    optC.classList.toggle('selected', opt === optC);
    optR.classList.toggle('selected', opt === optR);
  }));

  // Scroll to top
  const scrollBtn = document.getElementById('scroll-top');
  window.addEventListener('scroll', () => {
    scrollBtn.classList.toggle('visible', window.scrollY > 400);
  });

  // Filtres + rendu offres
  let allOffres = [];
  let activeFilter = 'all';

  const BADGE_MAP = {
    'CDI': '<span class="badge badge-cdi">CDI</span>',
    'CDD': '<span class="badge badge-cdd">CDD</span>',
    'Freelance': '<span class="badge badge-free">Freelance</span>',
    'Alternance': '<span class="badge badge-alt">Alternance</span>',
    'Intérimaire': '<span class="badge badge-inte">Intérimaire</span>',
    'Interimaire': '<span class="badge badge-inte">Intérimaire</span>'
  };

  const GRADIENT_MAP = {
    'CDI': 'linear-gradient(135deg,#1d4ed8,#60a5fa)',
    'CDD': 'linear-gradient(135deg,#b45309,#fcd34d)',
    'Freelance': 'linear-gradient(135deg,#7c3aed,#c4b5fd)',
    'Alternance': 'linear-gradient(135deg,#0369a1,#67e8f9)',
    'Intérimaire': 'linear-gradient(135deg,#b91c1c,#fca5a5)',
    'Interimaire': 'linear-gradient(135deg,#b91c1c,#fca5a5)'
  };

  function getInitials(titre = '') {
    return titre
      .split(' ')
      .slice(0, 2)
      .map(w => w[0] || '')
      .join('')
      .toUpperCase();
  }

  function normalizeType(type = '') {
    return String(type).toLowerCase().trim();
  }

  function renderCard(offre) {
    const tc = offre.typecontrat || offre.typeContrat || offre['Type de contrat'] || '';
    const badge = BADGE_MAP[tc] || `<span class="badge badge-cdi">${tc || 'Offre'}</span>`;
    const gradient = GRADIENT_MAP[tc] || 'linear-gradient(135deg,#1d4ed8,#4f7eff)';

    const competences =
      offre.competencesrequises ||
      offre.competences ||
      offre['Compétences requises'] ||
      offre.skills ||
      '';

    const skills = String(competences)
      .split(',')
      .map(s => s.trim())
      .filter(Boolean)
      .slice(0, 5)
      .map(s => `<span class="skill-tag">${s}</span>`)
      .join('');

    const titre =
      offre.titre ||
      offre.Titre ||
      'Poste non renseigné';

    const localisation =
      offre.localisation ||
      offre.Localisation ||
      '';

    const entreprise =
      offre.entreprise ||
      offre.Entreprise ||
      '';

    const salaire =
      offre.salaire ||
      offre.Salaire ||
      'Salaire à définir';

    const description =
      offre.description ||
      offre.Description ||
      '';

    const datePublication =
      offre.datepublication ||
      offre.datePublication ||
      offre['Date publication'] ||
      '';

    let dateTexte = '';
    if (datePublication) {
      try {
        dateTexte = new Date(datePublication).toLocaleDateString('fr-FR', {
          day: '2-digit',
          month: 'short'
        });
      } catch (e) {
        dateTexte = '';
      }
    }

    const desc = description
      ? (description.slice(0, 140) + (description.length > 140 ? '…' : ''))
      : '';

    return `
      <a class="job-card" href="candidature-spontanee.html?offre=${encodeURIComponent(titre)}" data-type="${normalizeType(tc)}">
        <div class="job-card-top">
          <div class="job-company-logo" style="background:${gradient}">${getInitials(titre)}</div>
          <div class="job-badges">
            <span class="badge badge-new">Nouveau</span>
            ${badge}
          </div>
        </div>

        <div class="job-title">${titre}</div>

        <div class="job-meta-row">
          ${localisation ? `<span>📍 ${localisation}</span>` : ''}
          ${entreprise ? `<span>🏢 ${entreprise}</span>` : ''}
          ${dateTexte ? `<span>📅 ${dateTexte}</span>` : ''}
        </div>

        ${desc ? `<p class="job-desc">${desc}</p>` : ''}
        ${skills ? `<div class="job-skills">${skills}</div>` : ''}

        <div class="job-footer">
          <span class="job-salary">${salaire}</span>
          <span class="job-apply-btn">Postuler</span>
        </div>
      </a>
    `;
  }

  function applyFilter() {
    const grid = document.getElementById('offres-grid');
    const empty = document.getElementById('offres-empty');
    const viewAllLink = document.querySelector('.view-all-row a');

    const filtered = activeFilter === 'all'
      ? allOffres
      : allOffres.filter(o => {
          const type =
            o.typecontrat ||
            o.typeContrat ||
            o['Type de contrat'] ||
            '';
          return normalizeType(type) === activeFilter;
        });

    grid.querySelectorAll('.job-card').forEach(c => c.remove());

    if (filtered.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      filtered.forEach(o => {
        grid.insertAdjacentHTML('beforeend', renderCard(o));
      });
    }

    if (viewAllLink) {
      const total = allOffres.length;
      viewAllLink.textContent = `Voir toutes les offres (${total})`;
    }
  }

  function filterJobs(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = type;
    applyFilter();
  }

  window.filterJobs = filterJobs;

  // ✅ Chargement direct Airtable
  const AIRTABLE_TOKEN = 'patNOUVEAU.xxxxxxxxxxxx'; // ← REMPLACEZ ICI
  const AIRTABLE_BASE_ID = 'appt58pKcrivGHSdp';
  const AIRTABLE_TABLE = 'Offres';

  async function loadOffres() {
    const loading = document.getElementById('offres-loading');

    try {
      const res = await fetch(
        `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}?maxRecords=20`,
        {
          headers: {
            'Authorization': 'Bearer ' + AIRTABLE_TOKEN
          }
        }
      );

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data?.error?.message || ('HTTP ' + res.status));
      }

      allOffres = Array.isArray(data.records)
        ? data.records.map(r => r.fields || {})
        : [];
    } catch (err) {
      console.warn('Erreur chargement offres:', err.message);
      allOffres = [];
    } finally {
      loading.style.display = 'none';
      applyFilter();
    }
  }

  loadOffres();

  // Contact form
  async function submitContact(e) {
    e.preventDefault();

    const btn = document.getElementById('contact-submit-btn');
    const alert = document.getElementById('contact-alert');

    const prenom = document.getElementById('contact-prenom').value.trim();
    const nom = document.getElementById('contact-nom').value.trim();
    const email = document.getElementById('contact-email').value.trim();
    const msg = document.getElementById('contact-message').value.trim();
    const typeEl = document.querySelector('input[name="type"]:checked');
    const sujet = typeEl ? typeEl.value : 'autre';

    if (!email || !msg) {
      alert.style.display = 'block';
      alert.style.background = 'rgba(239,68,68,.1)';
      alert.style.border = '1px solid rgba(239,68,68,.25)';
      alert.style.color = '#f87171';
      alert.textContent = 'Merci de renseigner votre email et votre message.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Envoi en cours…';
    alert.style.display = 'none';

    try {
      const res = await fetch('api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nom: `${prenom} ${nom}`.trim(),
          email: email,
          sujet: sujet,
          message: msg,
          source: 'page-accueil'
        })
      });

      const result = await res.json();

      if (res.ok && !result.error) {
        alert.style.display = 'block';
        alert.style.background = 'rgba(34,197,94,.1)';
        alert.style.border = '1px solid rgba(34,197,94,.25)';
        alert.style.color = '#4ade80';
        alert.textContent = 'Message envoyé ! Nous vous répondons sous 24h ouvrées.';

        document.getElementById('contact-prenom').value = '';
        document.getElementById('contact-nom').value = '';
        document.getElementById('contact-email').value = '';
        document.getElementById('contact-message').value = '';
      } else {
        throw new Error(result.details?.error?.message || result.error || 'Erreur inconnue');
      }
    } catch (err) {
      alert.style.display = 'block';
      alert.style.background = 'rgba(239,68,68,.1)';
      alert.style.border = '1px solid rgba(239,68,68,.25)';
      alert.style.color = '#f87171';
      alert.textContent = err.message || 'Erreur. Écrivez à contact@rh-prospects.fr';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Envoyer le message';
    }
  }

  window.submitContact = submitContact;
</script>
