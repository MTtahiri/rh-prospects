<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détail de l'offre - RH-Prospects</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f7f9fc; color:#111; line-height:1.5; }
    nav {
      position:fixed; top:0; left:0; right:0;
      background:rgba(255,255,255,0.98); backdrop-filter:blur(10px);
      border-bottom:1px solid #e2e8f0; padding:1rem 5%;
      display:flex; justify-content:space-between; align-items:center; z-index:1000;
    }
    .logo { font-family:'Space Grotesk',monospace; font-size:1.5rem; font-weight:700; color:#0057b3; text-decoration:none; }
    .logo span { color:#00a86b; }
    .container { max-width:1000px; margin:0 auto; padding:6rem 2rem 3rem; }
    .card { background:white; border-radius:24px; padding:2rem; box-shadow:0 8px 24px rgba(0,0,0,0.05); }
    h1 { font-family:'Space Grotesk',monospace; font-size:1.8rem; margin-bottom:0.5rem; }
    .meta { display:flex; gap:0.75rem; flex-wrap:wrap; margin:1rem 0 1.5rem; }
    .badge { font-size:0.75rem; padding:0.25rem 0.75rem; border-radius:50px; background:#e2e8f0; color:#2d3748; }
    .badge.contrat { background:#00a86b; color:white; }
    .description { margin:1.5rem 0; line-height:1.6; color:#4a5568; }
    .skills { display:flex; gap:0.5rem; flex-wrap:wrap; margin:1rem 0; }
    .skill { background:#f1f5f9; padding:0.25rem 0.75rem; border-radius:50px; font-size:0.75rem; }
    .form-candidature { margin-top:2rem; padding-top:1.5rem; border-top:1px solid #e2e8f0; }
    .form-group { margin-bottom:1rem; }
    label { font-weight:600; display:block; margin-bottom:0.25rem; }
    input, select, textarea { width:100%; padding:0.75rem; border:1px solid #cbd5e1; border-radius:12px; }
    button { background:#0057b3; color:white; border:none; padding:0.75rem 1.5rem; border-radius:50px; font-weight:600; cursor:pointer; }
    button:hover { background:#003d7a; }
    .alert { padding:0.75rem; border-radius:12px; margin-bottom:1rem; }
    .success { background:#d4edda; color:#155724; }
    .error { background:#f8d7da; color:#721c24; }
    footer { text-align:center; padding:2rem; color:#a0aec0; background:#111; margin-top:2rem; }
  </style>
</head>
<body>
<nav><a href="/" class="logo">RH-<span>Prospects</span></a></nav>
<div class="container">
  <div class="card" id="offreDetail">
    <p>Chargement de l'offre...</p>
  </div>
</div>
<footer>© 2025 RH-Prospects — Recrutement éthique & transparent</footer>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const offreId = urlParams.get('id');

  if (!offreId) {
    document.getElementById('offreDetail').innerHTML = '<p>Offre non spécifiée.</p>';
  } else {
    fetch(`/api/offre?id=${offreId}`)
      .then(res => res.json())
      .then(offre => {
        if (!offre || !offre.titre) throw new Error();
        document.getElementById('offreDetail').innerHTML = `
          <h1>${offre.titre}</h1>
          <div class="meta">
            <span class="badge contrat">${offre.type_contrat || 'CDI'}</span>
            <span class="badge">📍 ${offre.localisation || 'France'}</span>
            ${offre.salaire ? `<span class="badge">💰 ${offre.salaire}</span>` : ''}
          </div>
          <div class="description">${(offre.description || '').replace(/\n/g,'<br>')}</div>
          <div class="skills">
            ${(offre.competences_requises || '').split(',').map(s => `<span class="skill">${s.trim()}</span>`).join('')}
          </div>
          <div class="form-candidature">
            <h3>Postuler à cette offre</h3>
            <div id="candidatureAlert"></div>
            <form id="candidatureForm">
              <input type="hidden" name="offreId" value="${offreId}">
              <input type="hidden" name="offreTitre" value="${offre.titre}">
              <div class="form-group"><label>Prénom</label><input name="prenom" required></div>
              <div class="form-group"><label>Nom</label><input name="nom" required></div>
              <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
              <div class="form-group"><label>Téléphone</label><input name="telephone"></div>
              <div class="form-group"><label>Message / CV (lien ou texte)</label><textarea name="description" rows="3"></textarea></div>
              <button type="submit">Envoyer ma candidature</button>
            </form>
          </div>
        `;
        document.getElementById('candidatureForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const form = e.target;
          const data = {
            prenom: form.prenom.value,
            nom: form.nom.value,
            email: form.email.value,
            telephone: form.telephone.value,
            titre: form.offreTitre.value,
            offreId: form.offreId.value,
            description: form.description.value
          };
          try {
            const res = await fetch('/api/postuler', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
            });
            if (res.ok) {
              document.getElementById('candidatureAlert').innerHTML = '<div class="alert success">Candidature envoyée !</div>';
              form.reset();
            } else throw new Error();
          } catch(err) {
            document.getElementById('candidatureAlert').innerHTML = '<div class="alert error">Erreur, réessayez</div>';
          }
        });
      })
      .catch(() => {
        document.getElementById('offreDetail').innerHTML = '<p>Offre introuvable.</p>';
      });
  }
</script>
</body>
</html>
